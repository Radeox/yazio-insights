<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yazio Insights - Dark Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              yazio: {
                emerald: "#00ac84",
                sky: "#4ab4f5",
                orange: "#ff9f1c",
                coral: "#f45b69",
                lime: "#ceff1a",
                slate: "#0f172a",
                card: "#1e293b",
              },
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #0f172a;
        color: #f1f5f9;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
      .tab-btn {
        transition: all 0.2s ease;
        border: 2px solid transparent;
      }
      .tab-btn.active {
        border: 2px solid #00ac84;
        color: #00ac84;
        background-color: rgba(0, 172, 132, 0.05);
      }
      .sidebar {
        height: calc(100vh - 4rem);
        position: sticky;
        top: 0rem;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1e293b;
      }
      ::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }
      .avg-btn {
        border: 2px solid transparent;
        transition: all 0.2s ease;
      }
      .avg-btn.active {
        border-color: #00ac84 !important;
        background-color: #00ac84 !important;
        color: white !important;
      }
    </style>
  </head>
  <body class="min-h-screen font-sans antialiased text-slate-200">
    <div class="max-w-[1400px] mx-auto py-8 px-4">
      <header
        class="mb-8 flex flex-col md:flex-row justify-between items-center border-b border-slate-800 pb-6 gap-4"
      >
        <h1
          class="text-3xl font-black tracking-tight text-white flex items-center gap-3"
        >
          <span
            class="bg-yazio-emerald w-3 h-8 rounded-full shadow-[0_0_15px_rgba(0,172,132,0.4)]"
          ></span>
          YAZIO <span class="text-yazio-emerald font-light">INSIGHTS</span>
        </h1>
        <div
          class="text-[10px] text-slate-300 font-mono bg-slate-800/30 px-4 py-2 rounded-full border border-slate-700 uppercase tracking-widest"
          id="last-updated"
        ></div>
      </header>

      <!-- Tabs Navigation -->
      <div
        class="flex gap-2 mb-10 bg-slate-800/30 p-1 rounded-xl w-fit border border-slate-800/50"
      >
        <button
          onclick="showTab('overview')"
          id="btn-overview"
          class="tab-btn px-6 py-2 rounded-lg font-bold text-xs active"
        >
          OVERVIEW
        </button>
        <button
          onclick="showTab('macros')"
          id="btn-macros"
          class="tab-btn px-6 py-2 rounded-lg font-bold text-xs text-slate-300 hover:text-white"
        >
          ANALYSIS
        </button>
        <button
          onclick="showTab('food')"
          id="btn-food"
          class="tab-btn px-6 py-2 rounded-lg font-bold text-xs text-slate-300 hover:text-white"
        >
          JOURNAL
        </button>
      </div>

      <!-- Tab Content: Overview -->
      <div id="overview" class="tab-content active">
        <div class="flex flex-col lg:flex-row gap-8">
          <!-- Charts Column -->
          <div class="flex-grow space-y-8">
            <div
              class="bg-yazio-card p-6 rounded-2xl shadow-xl border border-slate-800/60 transition-all hover:border-slate-700"
            >
              <h2
                class="text-xs font-black mb-6 text-slate-300 uppercase tracking-[0.3em] flex items-center gap-2"
              >
                <div
                  class="w-1.5 h-1.5 rounded-full bg-yazio-emerald shadow-[0_0_8px_#00ac84]"
                ></div>
                ENERGY INTAKE
              </h2>
              <div class="h-64"><canvas id="energyChart"></canvas></div>
            </div>

            <div
              class="bg-yazio-card p-6 rounded-2xl shadow-xl border border-slate-800/60 transition-all hover:border-slate-700"
            >
              <h2
                class="text-xs font-black mb-6 text-slate-300 uppercase tracking-[0.3em] flex items-center gap-2"
              >
                <div
                  class="w-1.5 h-1.5 rounded-full bg-yazio-sky shadow-[0_0_8px_#4ab4f5]"
                ></div>
                ACTIVITY STEPS
              </h2>
              <div class="h-64"><canvas id="stepsChart"></canvas></div>
            </div>

            <div
              class="bg-yazio-card p-6 rounded-2xl shadow-xl border border-slate-800/60 transition-all hover:border-slate-700"
            >
              <h2
                class="text-xs font-black mb-6 text-slate-300 uppercase tracking-[0.3em] flex items-center gap-2"
              >
                <div
                  class="w-1.5 h-1.5 rounded-full bg-blue-400 shadow-[0_0_8px_#60a5fa]"
                ></div>
                HYDRATION
              </h2>
              <div class="h-64"><canvas id="waterChart"></canvas></div>
            </div>

            <div
              class="bg-yazio-card p-6 rounded-2xl shadow-xl border border-slate-800/60 transition-all hover:border-slate-700"
            >
              <h2
                class="text-xs font-black mb-6 text-slate-300 uppercase tracking-[0.3em] flex items-center gap-2"
              >
                <div
                  class="w-1.5 h-1.5 rounded-full bg-yazio-orange shadow-[0_0_8px_#ff9f1c]"
                ></div>
                PROTEIN
              </h2>
              <div class="h-64"><canvas id="proteinChart"></canvas></div>
            </div>

            <div
              class="bg-yazio-card p-6 rounded-2xl shadow-xl border border-slate-800/60 transition-all hover:border-slate-700"
            >
              <h2
                class="text-xs font-black mb-6 text-slate-300 uppercase tracking-[0.3em] flex items-center gap-2"
              >
                <div
                  class="w-1.5 h-1.5 rounded-full bg-yazio-lime shadow-[0_0_8px_#ceff1a]"
                ></div>
                CARBOHYDRATES
              </h2>
              <div class="h-64"><canvas id="carbChart"></canvas></div>
            </div>

            <div
              class="bg-yazio-card p-6 rounded-2xl shadow-xl border border-slate-800/60 transition-all hover:border-slate-700"
            >
              <h2
                class="text-xs font-black mb-6 text-slate-300 uppercase tracking-[0.3em] flex items-center gap-2"
              >
                <div
                  class="w-1.5 h-1.5 rounded-full bg-yazio-coral shadow-[0_0_8px_#f45b69]"
                ></div>
                LIPIDS / FAT
              </h2>
              <div class="h-64"><canvas id="fatChart"></canvas></div>
            </div>
          </div>

          <!-- Sidebar -->
          <div class="w-full lg:w-80 shrink-0">
            <div class="sidebar">
              <div
                class="bg-yazio-card p-6 rounded-2xl shadow-2xl border border-slate-700/50 space-y-8"
              >
                <h2
                  class="text-sm font-black text-white uppercase tracking-[0.2em] border-b border-slate-800"
                >
                  Averages
                </h2>

                <div class="grid grid-cols-2 gap-2">
                  <button
                    onclick="updateAverages(7)"
                    class="avg-btn bg-slate-800 text-slate-300 px-3 py-2 rounded-lg text-[10px] font-black hover:bg-slate-700 transition-colors uppercase tracking-widest"
                  >
                    7D
                  </button>
                  <button
                    onclick="updateAverages(30)"
                    class="avg-btn bg-slate-800 text-slate-300 px-3 py-2 rounded-lg text-[10px] font-black hover:bg-slate-700 transition-colors uppercase tracking-widest"
                  >
                    30D
                  </button>
                  <button
                    onclick="updateAverages(365)"
                    class="avg-btn bg-slate-800 text-slate-300 px-3 py-2 rounded-lg text-[10px] font-black hover:bg-slate-700 transition-colors uppercase tracking-widest"
                  >
                    1Y
                  </button>
                  <button
                    onclick="updateAverages(0)"
                    class="avg-btn bg-slate-800 text-slate-300 px-3 py-2 rounded-lg text-[10px] font-black hover:bg-slate-700 transition-colors active uppercase tracking-widest"
                  >
                    ALL
                  </button>
                </div>

                <div id="averages-content" class="space-y-4">
                  <div
                    class="p-4 bg-slate-800/30 rounded-xl border border-slate-800/50"
                  >
                    <div
                      class="text-[9px] text-slate-300 uppercase font-black tracking-widest mb-1"
                    >
                      Energy
                    </div>
                    <div
                      id="avg-energy"
                      class="text-2xl font-black text-yazio-emerald"
                    >
                      0 kcal
                    </div>
                  </div>
                  <div
                    class="p-4 bg-slate-800/30 rounded-xl border border-slate-800/50"
                  >
                    <div
                      class="text-[9px] text-slate-300 uppercase font-black tracking-widest mb-1"
                    >
                      Steps
                    </div>
                    <div
                      id="avg-steps"
                      class="text-2xl font-black text-yazio-sky"
                    >
                      0
                    </div>
                  </div>
                  <div
                    class="p-4 bg-slate-800/30 rounded-xl border border-slate-800/50"
                  >
                    <div
                      class="text-[9px] text-slate-300 uppercase font-black tracking-widest mb-1"
                    >
                      Water
                    </div>
                    <div
                      id="avg-water"
                      class="text-2xl font-black text-blue-400"
                    >
                      0 ml
                    </div>
                  </div>
                  <div
                    class="p-4 bg-slate-800/30 rounded-xl border border-slate-800/50"
                  >
                    <div
                      class="text-[9px] text-slate-300 uppercase font-black tracking-widest mb-1"
                    >
                      Protein
                    </div>
                    <div
                      id="avg-protein"
                      class="text-2xl font-black text-yazio-orange"
                    >
                      0g
                    </div>
                  </div>
                  <div
                    class="p-4 bg-slate-800/30 rounded-xl border border-slate-800/50"
                  >
                    <div
                      class="text-[9px] text-slate-300 uppercase font-black tracking-widest mb-1"
                    >
                      Carbs
                    </div>
                    <div
                      id="avg-carb"
                      class="text-2xl font-black text-yazio-lime"
                    >
                      0g
                    </div>
                  </div>
                  <div
                    class="p-4 bg-slate-800/30 rounded-xl border border-slate-800/50"
                  >
                    <div
                      class="text-[9px] text-slate-300 uppercase font-black tracking-widest mb-1"
                    >
                      Fat
                    </div>
                    <div
                      id="avg-fat"
                      class="text-2xl font-black text-yazio-coral"
                    >
                      0g
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Tab Content: Macros -->
      <div id="macros" class="tab-content space-y-8">
        <div
          class="bg-yazio-card p-6 rounded-2xl shadow-xl border border-slate-800"
        >
          <h2
            class="text-sm font-black mb-8 text-slate-300 uppercase tracking-[0.3em]"
          >
            Historical Data
          </h2>
          <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-800">
              <thead>
                <tr
                  class="text-left text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]"
                >
                  <th class="px-4 py-4">Date</th>
                  <th class="px-4 py-4 text-yazio-orange">
                    Protein (Act/Goal)
                  </th>
                  <th class="px-4 py-4 text-yazio-lime">Carbs (Act/Goal)</th>
                  <th class="px-4 py-4 text-yazio-coral">Fat (Act/Goal)</th>
                </tr>
              </thead>
              <tbody
                id="macros-table-body"
                class="divide-y divide-slate-800/50 text-xs text-slate-300 font-bold"
              ></tbody>
            </table>
          </div>
        </div>

        <div
          class="bg-yazio-card p-8 rounded-2xl shadow-xl border border-slate-800/60"
        >
          <h2
            class="text-sm font-black mb-8 text-slate-300 uppercase tracking-[0.3em] text-center"
          >
            7-Day Composition
          </h2>
          <div class="h-96"><canvas id="macrosChart"></canvas></div>
        </div>
      </div>

      <div id="food" class="tab-content space-y-8">
      <div class="bg-yazio-card p-6 md:p-10 rounded-2xl shadow-xl border border-slate-800">
      <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-4">
      <div class="flex items-center gap-6">
          <h2 class="text-xl font-black text-white uppercase tracking-widest italic border-l-4 border-yazio-emerald pl-4">Daily Journal</h2>
          <button onclick="exportJournalToCSV()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 text-[10px] font-black px-4 py-2 rounded-lg border border-slate-700 transition-colors uppercase tracking-widest flex items-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
              </svg>
              Export CSV
          </button>
      </div>
      <select id="food-date-select" onchange="updateFoodLog()" class="w-full md:w-64 bg-slate-800 border border-slate-700 text-white text-xs font-black rounded-lg focus:ring-1 focus:ring-yazio-emerald outline-none p-3 cursor-pointer appearance-none uppercase tracking-widest">
      </select>
      </div>
      <div id="food-log-content" class="space-y-12">
      <!-- Populated by JS -->
      </div>
      </div>
      </div>

    </div>

    <script>
      let allData = [];

      // Global Chart.js Defaults
      Chart.defaults.color = "#cbd5e1";
      Chart.defaults.borderColor = "rgba(255,255,255,0.05)";
      Chart.defaults.font.family = "system-ui, -apple-system, sans-serif";
      Chart.defaults.font.weight = "700";
      Chart.defaults.font.size = 11;

      function showTab(tabId) {
        document
          .querySelectorAll(".tab-content")
          .forEach((c) => c.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach((b) => {
          b.classList.remove("active", "text-yazio-emerald", "bg-slate-800/80");
          b.classList.add("text-slate-300");
        });
        document.getElementById(tabId).classList.add("active");
        const activeBtn = document.getElementById("btn-" + tabId);
        activeBtn.classList.add("active");
        activeBtn.classList.remove("text-slate-300");
      }

      async function init() {
        try {
          const response = await fetch("dashboard_data.json");
          allData = await response.json();

          if (allData.length > 0) {
            document.getElementById("last-updated").textContent =
              "SYNCED " + allData[allData.length - 1].date;

            const dateSelect = document.getElementById("food-date-select");
            allData
              .slice()
              .reverse()
              .forEach((d) => {
                const opt = document.createElement("option");
                opt.value = d.date;
                opt.textContent = d.date;
                dateSelect.appendChild(opt);
              });
          }

          renderDailyCharts();
          populateMacrosTable();
          renderMacrosChart();
          updateAverages(0);
          updateFoodLog();

          showTab("overview");
        } catch (error) {
          console.error("Error:", error);
        }
      }

      function updateFoodLog() {
        const date = document.getElementById("food-date-select").value;
        const dayData = allData.find((d) => d.date === date);
        const container = document.getElementById("food-log-content");
        container.innerHTML = "";

        if (!dayData || !dayData.food_log || dayData.food_log.length === 0) {
          container.innerHTML =
            '<p class="text-slate-500 italic text-center py-20 font-black uppercase tracking-[0.5em] text-[10px]">No activity logs for this period.</p>';
          return;
        }

        const meals = {};
        dayData.food_log.forEach((item) => {
          if (!meals[item.daytime]) meals[item.daytime] = [];
          meals[item.daytime].push(item);
        });

        const daytimeOrder = ["breakfast", "lunch", "dinner", "snack"];

        daytimeOrder.forEach((daytime) => {
          if (meals[daytime]) {
            const mealDiv = document.createElement("div");
            mealDiv.className =
              "border-l-2 border-slate-700 pl-6 space-y-4 mb-10";

            const title = document.createElement("h3");
            title.className =
              "text-sm font-black text-slate-300 uppercase tracking-[0.4em] mb-4 flex items-center justify-between";
            title.innerHTML = `<span>${daytime}</span>`;
            mealDiv.appendChild(title);

            const list = document.createElement("div");
            list.className = "grid grid-cols-1 gap-1.5";

            meals[daytime].forEach((item) => {
              const li = document.createElement("div");
              li.className =
                "flex justify-between items-center bg-slate-800/10 px-4 py-1.5 rounded-xl border border-slate-800/30 transition-all hover:bg-slate-800/30 group";

              const nameDiv = document.createElement("div");
              nameDiv.className = "flex items-center gap-4";
              nameDiv.innerHTML =
                (item.is_ai
                  ? `<span class="bg-yazio-emerald/10 text-yazio-emerald text-[8px] font-black px-2 py-0.5 rounded border border-yazio-emerald/20">AI</span>`
                  : `<span class="bg-slate-700/30 text-slate-300 text-[8px] font-black px-2 py-0.5 rounded border border-slate-700/50">DB</span>`) +
                `<div class="flex flex-col">
                    <span class="font-bold text-slate-200 group-hover:text-white transition-colors">${item.name || "Logged Item"}</span>
                    ${item.brand ? `<span class="text-[9px] text-slate-400 uppercase font-black tracking-widest">${item.brand}</span>` : ""}
                 </div>`;

              const macroDiv = document.createElement("div");
              macroDiv.className = "text-right flex items-center gap-8";
              macroDiv.innerHTML = `
                  <div class="hidden md:flex gap-6 text-[9px] font-black text-slate-400">
                      <div class="flex flex-col items-center"><span class="text-yazio-orange mb-0.5">${Math.round(item.protein || 0)}g</span><span class="opacity-30">PRO</span></div>
                      <div class="flex flex-col items-center"><span class="text-yazio-lime mb-0.5">${Math.round(item.carb || 0)}g</span><span class="opacity-30">CAR</span></div>
                      <div class="flex flex-col items-center"><span class="text-yazio-coral mb-0.5">${Math.round(item.fat || 0)}g</span><span class="opacity-30">FAT</span></div>
                  </div>
                  <div class="w-24 font-black text-slate-100 text-base">${Math.round(item.calories || 0)} <span class="text-[8px] text-slate-400 inline leading-none font-bold uppercase tracking-widest ml-1">KCAL</span></div>
              `;

              li.appendChild(nameDiv);
              li.appendChild(macroDiv);
              list.appendChild(li);
            });

            mealDiv.appendChild(list);
            container.appendChild(mealDiv);
          }
        });
      }

      function renderDailyCharts() {
        const labels = allData.map((d) => d.date);

        const createDataset = (label, dataKey, goalKey, color) => [
          {
            label: label,
            data: allData.map((d) => d[dataKey]),
            backgroundColor: color + "22",
            borderColor: color,
            borderWidth: 2,
            borderRadius: 4,
            barPercentage: 0.5,
          },
          {
            label: "Goal",
            data: allData.map((d) => d[goalKey]),
            borderColor: "#f45b69",
            borderWidth: 2,
            borderDash: [10, 5],
            pointRadius: 0,
            type: "line",
            tension: 0.2,
          },
        ];

        const chartOptions = {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { intersect: false, mode: "index" },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: "#1e293b",
              titleColor: "#fff",
              bodyColor: "#cbd5e1",
              borderColor: "#334155",
              borderWidth: 1,
              padding: 12,
              cornerRadius: 8,
              usePointStyle: true,
            },
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: {
                maxRotation: 0,
                autoSkip: true,
                maxTicksLimit: 12,
                font: { size: 9 },
                color: "#94a3b8",
              },
            },
            y: {
              grid: { color: "rgba(255,255,255,0.03)" },
              border: { display: false },
              beginAtZero: true,
              ticks: { font: { size: 9 }, color: "#94a3b8" },
            },
          },
        };

        new Chart(document.getElementById("energyChart"), {
          type: "bar",
          data: {
            labels: labels,
            datasets: createDataset(
              "kcal",
              "actual_energy",
              "goal_energy",
              "#00ac84",
            ),
          },
          options: chartOptions,
        });

        new Chart(document.getElementById("stepsChart"), {
          type: "bar",
          data: {
            labels: labels,
            datasets: createDataset("Steps", "steps", "goal_steps", "#4ab4f5"),
          },
          options: chartOptions,
        });

        new Chart(document.getElementById("waterChart"), {
          type: "bar",
          data: {
            labels: labels,
            datasets: createDataset(
              "ml",
              "water_intake",
              "goal_water",
              "#60a5fa",
            ),
          },
          options: chartOptions,
        });

        new Chart(document.getElementById("proteinChart"), {
          type: "bar",
          data: {
            labels: labels,
            datasets: createDataset(
              "Protein (g)",
              "actual_protein",
              "goal_protein",
              "#ff9f1c",
            ),
          },
          options: chartOptions,
        });

        new Chart(document.getElementById("carbChart"), {
          type: "bar",
          data: {
            labels: labels,
            datasets: createDataset(
              "Carbs (g)",
              "actual_carb",
              "goal_carb",
              "#ceff1a",
            ),
          },
          options: chartOptions,
        });

        new Chart(document.getElementById("fatChart"), {
          type: "bar",
          data: {
            labels: labels,
            datasets: createDataset(
              "Fat (g)",
              "actual_fat",
              "goal_fat",
              "#f45b69",
            ),
          },
          options: chartOptions,
        });
      }

      function populateMacrosTable() {
        const tbody = document.getElementById("macros-table-body");
        tbody.innerHTML = "";
        allData
          .slice(-30)
          .reverse()
          .forEach((d) => {
            const row = `<tr class="hover:bg-slate-800/20 transition-colors">
                    <td class="px-4 py-4 font-mono text-[10px] text-slate-400 tracking-tighter">${d.date}</td>
                    <td class="px-4 py-4"><span class="text-yazio-orange">${Math.round(d.actual_protein)}</span><span class="text-slate-600 mx-1">/</span><span class="text-slate-500">${Math.round(d.goal_protein)}g</span></td>
                    <td class="px-4 py-4"><span class="text-yazio-lime">${Math.round(d.actual_carb)}</span><span class="text-slate-600 mx-1">/</span><span class="text-slate-500">${Math.round(d.goal_carb)}g</span></td>
                    <td class="px-4 py-4"><span class="text-yazio-coral">${Math.round(d.actual_fat)}</span><span class="text-slate-600 mx-1">/</span><span class="text-slate-500">${Math.round(d.goal_fat)}g</span></td>
                </tr>`;
            tbody.innerHTML += row;
          });
      }

      function renderMacrosChart() {
        const last7 = allData.slice(-7);
        new Chart(document.getElementById("macrosChart"), {
          type: "bar",
          data: {
            labels: last7.map((d) => d.date),
            datasets: [
              {
                label: "Protein",
                data: last7.map((d) => d.actual_protein),
                backgroundColor: "#ff9f1c",
                borderRadius: 4,
              },
              {
                label: "Carbs",
                data: last7.map((d) => d.actual_carb),
                backgroundColor: "#ceff1a",
                borderRadius: 4,
              },
              {
                label: "Fat",
                data: last7.map((d) => d.actual_fat),
                backgroundColor: "#f45b69",
                borderRadius: 4,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: { stacked: true, grid: { display: false } },
              y: { stacked: true, grid: { color: "rgba(255,255,255,0.03)" } },
            },
            plugins: {
              legend: {
                position: "bottom",
                labels: {
                  usePointStyle: true,
                  padding: 30,
                  boxWidth: 6,
                  font: { size: 10 },
                },
              },
            },
          },
        });
      }

      function updateAverages(days) {
        let slice = days === 0 ? allData : allData.slice(-days);
        if (slice.length === 0) return;

        const avg = (arr) =>
          (arr.reduce((a, b) => a + (b || 0), 0) / arr.length).toFixed(1);

        document.getElementById("avg-energy").textContent =
          Math.round(avg(slice.map((d) => d.actual_energy))) + " kcal";
        document.getElementById("avg-steps").textContent = Math.round(
          avg(slice.map((d) => d.steps)),
        );
        document.getElementById("avg-water").textContent =
          Math.round(avg(slice.map((d) => d.water_intake))) + " ml";
        document.getElementById("avg-protein").textContent =
          Math.round(avg(slice.map((d) => d.actual_protein))) + "g";
        document.getElementById("avg-carb").textContent =
          Math.round(avg(slice.map((d) => d.actual_carb))) + "g";
        document.getElementById("avg-fat").textContent =
          Math.round(avg(slice.map((d) => d.actual_fat))) + "g";

        document.querySelectorAll(".avg-btn").forEach((btn) => {
          btn.classList.remove("active");
        });

        const selectedBtn = event
          ? event.currentTarget
          : document.querySelector('.avg-btn[onclick="updateAverages(0)"]');
        if (selectedBtn) {
          selectedBtn.classList.add("active");
        }
      }

        function exportJournalToCSV() {
          if (!allData || allData.length === 0) {
            alert("No data available to export.");
            return;
          }

          const csvRows = [["Date", "Meal Type", "Dish Name"]];

          allData.forEach((day) => {
            if (day.food_log && day.food_log.length > 0) {
              day.food_log.forEach((item) => {
                csvRows.push([
                  day.date,
                  item.daytime || "unknown",
                  (item.name || "Unknown Item").replace(/"/g, '""'), // Escape quotes for CSV
                ]);
              });
            }
          });

          const csvContent = csvRows
            .map((row) => row.map((cell) => `"${cell}"`).join(","))
            .join("\n");

          const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.setAttribute("href", url);
          link.setAttribute("download", `yazio_journal_export_${new Date().toISOString().split('T')[0]}.csv`);
          link.style.visibility = "hidden";
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        }

      init();
    </script>
  </body>
</html>
